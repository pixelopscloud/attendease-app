name: DevSecOps Pipeline

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: pixelopscloud/attendease-backend
  FRONTEND_IMAGE: pixelopscloud/attendease-frontend

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-scan-push:
    name: Build, Trivy Scan & Push
    runs-on: self-hosted
    needs: sonarcloud
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set Image Tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Backend
        run: docker build -t $BACKEND_IMAGE:${{ steps.tag.outputs.tag }} ./backend
      - name: Build Frontend
        run: docker build -t $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }} ./frontend
      
      - name: Trivy Scan Backend
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity CRITICAL,HIGH --ignore-unfixed $BACKEND_IMAGE:${{ steps.tag.outputs.tag }} || true

      - name: Trivy Scan Frontend
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity CRITICAL,HIGH --ignore-unfixed $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }} || true
            
      - name: Push Images
        run: |
          docker push $BACKEND_IMAGE:${{ steps.tag.outputs.tag }}
          docker push $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }}

  deploy-dev:
    name: Deploy to Dev
    runs-on: self-hosted
    needs: build-scan-push
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: pixelopscloud/attendease-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra
      - name: Update Dev Image Tags
        run: |
          NEW_TAG=${{ needs.build-scan-push.outputs.image_tag }}
          sed -i "s|backend:.*|backend:$NEW_TAG|g" infra/dev/backend/deployment.yaml
          sed -i "s|frontend:.*|frontend:$NEW_TAG|g" infra/dev/frontend/deployment.yaml
      - name: Commit and Push
        run: |
          cd infra
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: update dev image tag to ${{ needs.build-scan-push.outputs.image_tag }}"
            git push
          fi

  owasp-zap:
    name: OWASP ZAP Scan
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - name: Wait for ArgoCD Sync
        run: sleep 60
      - name: ZAP Scan
        run: |
          mkdir -p /tmp/zap-work
          chmod 777 /tmp/zap-work
          docker run --rm --user root --network host -v /tmp/zap-work:/zap/wrk:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:30081 -r zap-report.html -I || true
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: /tmp/zap-work/zap-report.html

  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: owasp-zap
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: pixelopscloud/attendease-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update Prod Image Tags
        run: |
          NEW_TAG=${{ needs.build-scan-push.outputs.image_tag }}
          # Yeh command v1.0.0 ko dhoond kar naye tag se badal degi
          sed -i "s|backend:.*|backend:$NEW_TAG|g" infra/prod/backend/deployment.yaml
          sed -i "s|frontend:.*|frontend:$NEW_TAG|g" infra/prod/frontend/deployment.yaml

      - name: Commit and Push
        run: |
          cd infra
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          # Sirf tab commit karega agar change milega
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: promote to prod - tag ${{ needs.build-scan-push.outputs.image_tag }}"
            git push
          else
            echo "No changes detected in prod files."
          fi
